syntax = "proto3";

package com.drmq.protocol;

option java_package = "com.drmq.protocol";
option java_outer_classname = "DRMQProtocol";
option java_multiple_files = false;

// Request to produce a message to a topic
message ProduceRequest {
    string topic = 1;
    bytes payload = 2;
    optional string key = 3;  // Optional message key for partitioning (future use)
    int64 timestamp = 4;      // Client-side timestamp
}

// Response after producing a message
message ProduceResponse {
    bool success = 1;
    int64 offset = 2;         // Assigned offset if successful
    string error_message = 3; // Error details if failed
}

// Internal message representation stored in the broker
message StoredMessage {
    int64 offset = 1;
    string topic = 2;
    bytes payload = 3;
    optional string key = 4;
    int64 timestamp = 5;      // Original client timestamp
    int64 stored_at = 6;      // Broker storage timestamp
}

// Request to consume messages from a topic
message ConsumeRequest {
    string topic = 1;
    int64 from_offset = 2;    // Starting offset (inclusive)
    int32 max_messages = 3;   // Maximum number of messages to fetch
    int64 timeout_ms = 4;     // Long-poll timeout (0 = return immediately)
}

// Response containing consumed messages
message ConsumeResponse {
    bool success = 1;
    repeated StoredMessage messages = 2;  // List of messages
    string error_message = 3;             // Error details if failed
}

// Request to commit a consumer group's offset for a topic
message CommitOffsetRequest {
    string consumer_group = 1;
    string topic = 2;
    int64 offset = 3;   // The next offset to read (last processed + 1)
}

// Response to a commit offset request
message CommitOffsetResponse {
    bool success = 1;
    string error_message = 2;
}

// Request to fetch a consumer group's committed offset for a topic
message FetchOffsetRequest {
    string consumer_group = 1;
    string topic = 2;
}

// Response with the committed offset
message FetchOffsetResponse {
    bool success = 1;
    int64 offset = 2;         // The committed offset, or -1 if none exists
    string error_message = 3;
}

// Envelope for TCP framing - wraps all messages with type info
message MessageEnvelope {
    MessageType type = 1;
    bytes payload = 2;  // Serialized inner message
}

// --- Raft log entry (wraps a user message for Raft replication) ---
message RaftEntry {
    int64 term = 1;           // Term in which the entry was created
    int64 index = 2;          // Position in the Raft log (1-indexed)
    string topic = 3;         // Target topic for the message
    bytes payload = 4;        // Message payload
    optional string key = 5;  // Optional message key
    int64 timestamp = 6;      // Client-side timestamp
}

// --- Raft leader election ---
message RequestVoteRequest {
    int64 term = 1;              // Candidate's term
    string candidate_id = 2;    // Candidate requesting vote
    int64 last_log_index = 3;   // Index of candidate's last log entry
    int64 last_log_term = 4;    // Term of candidate's last log entry
}

message RequestVoteResponse {
    int64 term = 1;           // Current term, for candidate to update itself
    bool vote_granted = 2;    // True = vote granted
}

// --- Raft log replication (also used as heartbeat when entries is empty) ---
message AppendEntriesRequest {
    int64 term = 1;                   // Leader's term
    string leader_id = 2;            // So followers know who the leader is
    int64 prev_log_index = 3;        // Index of log entry immediately preceding new ones
    int64 prev_log_term = 4;         // Term of prevLogIndex entry
    repeated RaftEntry entries = 5;  // Log entries to store (empty for heartbeat)
    int64 leader_commit = 6;         // Leader's commitIndex
}

message AppendEntriesResponse {
    int64 term = 1;           // Current term, for leader to update itself
    bool success = 2;         // True if follower contained entry matching prevLogIndex/prevLogTerm
    int64 match_index = 3;    // Follower's last replicated index (for leader's matchIndex tracking)
}

enum MessageType {
    UNKNOWN = 0;
    PRODUCE_REQUEST = 1;
    PRODUCE_RESPONSE = 2;
    CONSUME_REQUEST = 3;
    CONSUME_RESPONSE = 4;
    HEARTBEAT = 5;
    COMMIT_OFFSET_REQUEST = 6;
    COMMIT_OFFSET_RESPONSE = 7;
    FETCH_OFFSET_REQUEST = 8;
    FETCH_OFFSET_RESPONSE = 9;
    // Raft RPCs
    REQUEST_VOTE_REQUEST = 10;
    REQUEST_VOTE_RESPONSE = 11;
    APPEND_ENTRIES_REQUEST = 12;
    APPEND_ENTRIES_RESPONSE = 13;
}
